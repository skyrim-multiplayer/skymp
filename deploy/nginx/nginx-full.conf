# Full nginx config — installed by Setup-Nginx.bat once certificates exist.
#   api.skyrimroleplay.co.uk       -> backend API     (localhost:4000)
#   dashboard.skyrimroleplay.co.uk -> admin dashboard (localhost:4002)
# Certificates are PEM files exported by win-acme into C:/nginx/certs.
worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_names_hash_bucket_size 64;

    ssl_certificate     C:/nginx/certs/api.skyrimroleplay.co.uk-chain.pem;
    ssl_certificate_key C:/nginx/certs/api.skyrimroleplay.co.uk-key.pem;

    # Drop requests for hostnames we don't serve (no response at all).
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        server_name _;
        return 444;
    }

    # HTTP: keep ACME renewals working, redirect the rest to HTTPS.
    server {
        listen 80;
        server_name api.skyrimroleplay.co.uk dashboard.skyrimroleplay.co.uk;

        location ^~ /.well-known/acme-challenge/ {
            root C:/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Backend API
    server {
        listen 443 ssl;
        server_name api.skyrimroleplay.co.uk;

        # The client-files zip streams through this proxy.
        client_max_body_size 64m;

        location / {
            proxy_pass         http://127.0.0.1:4000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
        }
    }

    # Admin dashboard
    server {
        listen 443 ssl;
        server_name dashboard.skyrimroleplay.co.uk;

        location / {
            proxy_pass         http://127.0.0.1:4002;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
