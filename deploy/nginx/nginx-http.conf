# Phase-1 nginx config — HTTP only, used while certificates don't exist yet.
# Serves ACME http-01 challenges from C:/nginx/html so win-acme can validate,
# redirects everything else to HTTPS (which comes alive in phase 2).
worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_names_hash_bucket_size 64;

    server {
        listen 80;
        server_name api.[YOUR WEBSITE HERE] dashboard.[YOUR WEBSITE HERE];

        location ^~ /.well-known/acme-challenge/ {
            root C:/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
}