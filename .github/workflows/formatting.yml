name: Formatting check
on: [push, pull_request]

env:
  LINTER_URL: https://raw.githubusercontent.com/skyrim-multiplayer/linter/059b0b636b06fc20f249adc3fa3002c538e6a1f5/dist/linter.mjs
  LINTER_SHA256: a7f1982085a5c56e3860b9b71a316817a165e495af2ef34d5b9be7f3f22b4458

jobs:
    formatting-check:
        name: Formatting Check
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: Download linter
            run: |
              mkdir -p .linter
              curl -fsSL "$LINTER_URL" -o .linter/linter.mjs
              echo "$LINTER_SHA256  .linter/linter.mjs" | sha256sum -c -

          - name: Run linters
            run: node .linter/linter.mjs --lint --no-path --mode gha
