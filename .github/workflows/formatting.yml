name: Formatting check
on: [push, pull_request]
jobs:
    formatting-check:
        name: Formatting Check
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: Run linters via JS
            run: |
              cd "${{ github.workspace }}/misc/git-hooks" && yarn
              node ./linter.js --lint --no-path --mode gha
