name: Formatting check
on: [push, pull_request]

env:
  LINTER_URL: https://raw.githubusercontent.com/skyrim-multiplayer/linter/main/dist/linter.mjs
  LINTER_SHA256: 0e9919867241a759a1b5920cf471fa61caa76b69eea2f320832e5b847e5af260

jobs:
    formatting-check:
        name: Formatting Check
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: Download linter
            run: |
              mkdir -p .linter
              curl -fsSL "$LINTER_URL" -o .linter/linter.mjs
              echo "$LINTER_SHA256  .linter/linter.mjs" | sha256sum -c -

          - name: Run linters
            run: node .linter/linter.mjs --lint --no-path --mode gha
