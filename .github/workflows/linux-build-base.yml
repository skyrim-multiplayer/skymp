name: Linux build base
on:
  workflow_call:
    inputs:
      base_system:
        type: string
        description: Base system name (one of the dependency scripts)
        required: true
      skip_tests:
        type: boolean
        description: Only build, skip tests and other checks
        required: false
        default: false
      extra_build_args:
        type: string
        description: 'Shell-escaped args for `./build.sh --build`. Example: `--target=skymp5-server`'
        required: false
        default: ''
      auto_merge_action_config:
        type: string
        description: Auto-merge action config
        required: false
        default: ''
    secrets:
      combined_server_token:
        description: Token to check out and gather PRs required for building the server and gaamemode
        required: false

env:
    BUILD_TYPE: RelWithDebInfo

jobs:
    linux-build-base:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v6
            with:
              repository: skyrim-multiplayer/skymp
              token: ${{ secrets.combined_server_token || github.token }}
              submodules: recursive
              fetch-depth: 0
              persist-credentials: false

          - name: Gather PRs
            id: gather_prs
            if: ${{ inputs.auto_merge_action_config }}
            uses: skyrim-multiplayer/auto-merge-action@main
            with:
              path: ${{ github.workspace }}
              repositories: ${{ inputs.auto_merge_action_config }}
              token: ${{ secrets.combined_server_token }}

          - name: Output commit tuple
            if: ${{ inputs.auto_merge_action_config }}
            run: |
              echo 'Commit tuple: ${{ steps.gather_prs.outputs['commit-tuple'] }}' | tee -a $GITHUB_STEP_SUMMARY

          - name: Debug - print env
            run: env

          - name: Get/build image to use for building & testing
            run: |
              set -x  # print executed commands

              echo Some debug data
              id
              uname -a
              lsb_release -a

              # cat ${{github.workspace}}/misc/github_env_linux >> "$GITHUB_ENV"

              # get base image for this distro (or build configuration, in case with skymp-deps)
              base_image="`misc/deps_linux/${{ inputs.base_system }}.sh --get-image-uri`"

              docker run \
                --name prepare_deps_container \
                -v "${{github.workspace}}:/src" \
                -w "/src" \
                -e "CI=$CI" \
                -e "CREATE_UID=`id -u`" \
                "$base_image" \
                'misc/deps_linux/${{ inputs.base_system }}.sh' '--ensure-deps-noninteractive'

              docker commit prepare_deps_container localhost/buildimage
              docker rm prepare_deps_container

          - name: Debug - check build tools
            run:
              docker run --rm -v "${{ github.workspace }}:/src" -w /src -u skymp localhost/buildimage bash -c "$script"
            env:
              script: |
                print_info_unsafe() {
                  echo .
                  echo .
                  echo "=== Checking $1 ==="
                  out="`which $1`"
                  ret="$?"
                  if [ "$ret" != 0 -o -z "$out" ]; then
                    echo "Which exited with $ret $out"
                    return
                  fi
                  ls -lh "$out"
                  echo "version call:"
                  "$out" --version
                }

                print_info() {
                  print_info_unsafe "$@" || true
                }

                print_info clang++
                print_info clang++-15
                print_info cmake
                print_info ninja
                print_info node
                print_info yarn
                print_info git
                print_info zip
                print_info unzip
                print_info curl

                echo .
                echo .
                echo === misc ===
                echo "current dir is $PWD"
                echo /src:
                ls -lh /src

                echo .
                echo .
                echo === env ===
                ./build.sh --print-env

          # Download Skyrim SE data files
          - uses: suisei-cn/actions-download-file@v1
            if: ${{ !inputs.skip_tests }}
            name: Download Skyrim.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Skyrim.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            if: ${{ !inputs.skip_tests }}
            name: Download Update.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Update.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            if: ${{ !inputs.skip_tests }}
            name: Download Dawnguard.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Dawnguard.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            if: ${{ !inputs.skip_tests }}
            name: Download HearthFires.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/HearthFires.esm"
              target: ${{github.workspace}}/skyrim_data_files/
          - uses: suisei-cn/actions-download-file@v1
            if: ${{ !inputs.skip_tests }}
            name: Download Dragonborn.esm
            with:
              url: "https://gitlab.com/pospelov/se-data/-/raw/main/Dragonborn.esm"
              target: ${{github.workspace}}/skyrim_data_files/

          - name: Prepare
            run: |
              docker run --rm -v "${{ github.workspace }}:/src" -w /src -u root localhost/buildimage \
                chown -R skymp:skymp /src

          - name: CMake Configure
            id: cmake_configure
            run: |
              docker run --rm -v "${{ github.workspace }}:/src" -w /src -u skymp localhost/buildimage \
                ./build.sh --configure \
                -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
                -DUNIT_DATA_DIR="/src/skyrim_data_files"

          - name: Upload vcpkg logs
            if: always()
            uses: actions/upload-artifact@v7
            with:
              name: ${{inputs.base_system}}_vcpkg_logs
              path: |
                ${{github.workspace}}/build/vcpkg-*.log
                ${{github.workspace}}/vcpkg/buildtrees/**/*.log

          # Workaround for https://github.com/actions/upload-artifact/issues/785 and 769
          - name: Rename compile_commands.json
            run: |
              cd '${{ github.workspace }}/build'
              ln -s compile_commands.json '${{ inputs.base_system }}_compile_commands.json'

          - name: Upload compile_commands.json
            uses: actions/upload-artifact@v7
            with:
                name: ${{ inputs.base_system }}_compile_commands.json
                path: ${{ github.workspace }}/build/${{ inputs.base_system }}_compile_commands.json
                archive: false

          - name: Build
            run: |
              docker run --rm -v "${{ github.workspace }}:/src" -w /src -u skymp localhost/buildimage \
                ./build.sh --build ${{ inputs.extra_build_args }}

          - name: Prepare dist.tar.gz
            run: |
              docker run --rm -v "${{ github.workspace }}:/src" -w /src/build -u skymp localhost/buildimage \
                tar czvf dist.tar.gz dist

          # Workaround for https://github.com/actions/upload-artifact/issues/785 and 769
          - name: Rename dist.tar.gz
            run: |
              cd '${{ github.workspace }}/build'
              ln -s dist.tar.gz '${{ inputs.base_system }}_dist.tar.gz'

          - name: Upload dist.tar.gz
            uses: actions/upload-artifact@v7
            with:
              name: ${{ inputs.base_system }}_dist.tar.gz
              path: ${{ github.workspace }}/build/${{ inputs.base_system }}_dist.tar.gz
              archive: false

          - name: Test
            if: ${{ !inputs.skip_tests }}
            run: |
              docker run --rm -v "${{ github.workspace }}:/src" -w /src/build -u skymp localhost/buildimage \
                ctest -C ${{env.BUILD_TYPE}} --verbose --output-on-failure
